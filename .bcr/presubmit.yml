bcr_test_module:
  module_path: "e2e/bzlmod"
  matrix:
    platform: ["ubuntu2204", "macos", "windows"]
    bazel: [7.x, 8.x]
  tasks:
    run_tests:
      name: "Build the test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "//..."
    run_aspect:
      name: "Run the fawltydeps aspect"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
        - "--config=fawltydeps"
      build_targets:
        - "//..."
